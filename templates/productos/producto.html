<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Producto · Pétalos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/producto.css') }}">
</head>

<body>
    <div class="container">

        {% if message%}
        <div id="customAlert" class="">
            <div class="alert-content">
                <div class="alert-icon success">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h3 id="alertTitle">¡Éxito!</h3>
                <p id="alertMessage">{{message}}</p>
                <button class="alert-btn" onclick="closeAlert()">
                    <i class="fas fa-check"></i> Aceptar
                </button>
            </div>
        </div>
        {% endif %}


        <div class="form-header">
            <a href="{{ url_for('index') }}" class="back-btn">
                <i class="fas fa-arrow-left"></i> Volver
            </a>
            <h1><i class="fas fa-plus-circle"></i> Nuevo Producto</h1>
            <p>Completa los datos para agregar un nuevo producto al catálogo</p>
        </div>


        <form action="{{ url_for('create_producto') }}" method="POST" enctype="multipart/form-data" class="product-form"
            id="productForm">
            <!-- Nombre -->
            <div class="form-group">
                <label for="name">
                    <i class="fas fa-tag"></i> Nombre del producto *
                </label>
                <input type="text" id="name" name="name" placeholder="Ej: Rosa Roja" required autocomplete="off">
                <span class="error-message" id="nameError"></span>
            </div>


            <!-- Precio -->
            <div class="form-group">
                <label for="price">
                    <i class="fas fa-dollar-sign"></i> Precio *
                </label>
                <div class="price-input-wrapper">
                    <span class="currency-symbol">$</span>
                    <input type="number" id="price" name="price" placeholder="0.00" required step="0.01" min="0.01">
                </div>
                <span class="error-message" id="priceError"></span>
            </div>

            <!-- Imagen -->
            <div class="form-group">
                <label for="imagen">
                    <i class="fas fa-image"></i> Imagen del producto
                </label>
                <div class="file-upload-wrapper">
                    <input type="file" id="imagen" name="imagen" accept="image/*" class="file-input">
                    <div class="file-upload-preview" id="imagePreview">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Haz clic o arrastra una imagen</p>
                        <span>Formatos: JPG, PNG, GIF</span>
                    </div>
                </div>
                <small class="help-text">
                    <i class="fas fa-info-circle"></i>
                    Tamaño máximo: 5MB
                </small>
            </div>

            <!-- Botones de acción -->
            <div class="form-actions">
                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="fas fa-save"></i> Crear Producto
                </button>
                <button type="reset" class="btn-reset">
                    <i class="fas fa-undo"></i> Limpiar
                </button>
            </div>
        </form>
    </div>
    <!-- Agrega este HTML al final del body en crear_producto.html -->
    <!-- Alert personalizado -->


    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // crear_producto.js
        $(document).ready(function () {
            // Validación en tiempo real del teléfono

            // Validación del nombre
            $('#name').on('input', function () {
                if (this.value.length > 0 && this.value.length < 3) {
                    $('#nameError').text('El nombre debe tener al menos 3 caracteres').addClass('show');
                    $(this).addClass('error');
                } else {
                    $('#nameError').removeClass('show').text('');
                    $(this).removeClass('error');
                }
            });

            // Validación del precio
            $('#price').on('input', function () {
                if (this.value > 0) {
                    $('#priceError').removeClass('show').text('');
                    $(this).removeClass('error');
                } else {
                    $('#priceError').text('El precio debe ser mayor a 0').addClass('show');
                    $(this).addClass('error');
                }
            });

            // Previsualización de imagen
            $('#imagen').on('change', function (e) {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    const preview = $('#imagePreview');

                    reader.onload = function (e) {
                        preview.html(`
                    <img src="${e.target.result}" alt="Previsualización">
                    <span style="margin-top: 0.5rem;">${file.name}</span>
                    <span style="font-size: 0.8rem;">${(file.size / 1024).toFixed(2)} KB</span>
                `);
                        preview.addClass('has-image');
                    };
                    reader.readAsDataURL(file);
                }
            });

            $('.alert-btn').on('click', function () {
                $('#customAlert').addClass('custom-alert')
            })
        });

    </script>
</body>

</html>
